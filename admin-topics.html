<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Добавление тем — Админ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="admin-app">
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="https://www.tajmedun.tj/bitrix/templates/tajmedun/images/logo_new2.png" alt="ТГМУ" class="sidebar-logo">
      <div class="sidebar-brand-text">
        <span class="sidebar-title">Админ</span>
        <span class="sidebar-subtitle">Кафедра детских болезней · ТГМУ</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="admin-topics.html" class="sidebar-link active">
        <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><path d="M8 7h8"/><path d="M8 11h8"/></svg></span>
        <span>Добавление тем</span>
      </a>
      <a href="admin-exam.html" class="sidebar-link">
        <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></span>
        <span>Экзаменационные вопросы</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="admin.html" class="sidebar-link-muted">← В админ-панель</a>
      <a href="index.html" class="sidebar-link-muted">На главную</a>
    </div>
  </aside>
  <div class="app-main">
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="topbar-title">Добавление тем</h1>
        <p class="topbar-sub">Создание и редактирование тем курса</p>
      </div>
    </header>
    <div class="content">
      <div class="admin-wrap">
        <h2 class="admin-section-title">Добавить или редактировать тему</h2>
        <div id="admin-login" class="admin-sub-block">
          <div class="admin-sub-title">Вход</div>
          <div class="input-group">
            <input type="password" id="adminPwd" class="input" placeholder="Пароль администратора">
            <button class="btn-primary" id="adminLoginBtn">Войти</button>
          </div>
          <p id="adminLoginStatus" class="form-hint"></p>
        </div>
        <div id="admin-panel" style="display:none;">
          <div class="admin-sub-block">
            <label class="label" for="adminTopicId">ID темы <span class="form-hint">(пусто = новая)</span></label>
            <div class="input-group">
              <input type="text" id="adminTopicId" class="input" placeholder="Например: 5">
              <button class="btn-outline" id="adminLoadBtn">Загрузить</button>
            </div>
            <label class="label" for="adminTitle">Название темы *</label>
            <input type="text" id="adminTitle" class="input" placeholder="Пневмония у детей раннего возраста">
            <label class="label" for="adminDesc">Описание (Markdown)</label>
            <textarea id="adminDesc" class="input input-area" style="min-height:140px" placeholder="## Определение&#10;Пневмония — острое инфекционное…"></textarea>
            <label class="label" for="adminVideo">Ссылка на видео (Общий)</label>
            <input type="text" id="adminVideo" class="input" placeholder="https://youtu.be/...">
            <label class="label" for="adminVideoPathogen">Ссылка на видео (Патогенез)</label>
            <input type="text" id="adminVideoPathogen" class="input" placeholder="https://youtu.be/...">
            <div class="two-col">
              <div>
                <label class="label" for="adminCourse">Курс</label>
                <select id="adminCourse" class="select">
                  <option value="">Все курсы</option>
                  <option value="4">4 курс</option>
                  <option value="6">6 курс</option>
                </select>
              </div>
              <div>
                <label class="label" for="adminFaculty">Факультет</label>
                <select id="adminFaculty" class="select">
                  <option value="">Все факультеты</option>
                  <option value="Педиатрический">Педиатрический</option>
                  <option value="Лечебный">Лечебный</option>
                </select>
              </div>
            </div>
            <button class="btn-primary" id="adminSaveTopicBtn">Сохранить тему</button>
            <p id="adminTopicStatus" class="form-hint"></p>
          </div>
        </div>
      </div>
    </div>
    <footer class="app-footer">
      <a href="admin.html">← В админ-панель</a>
      <a href="index.html">На главную</a>
    </footer>
  </div>
</div>
<script src="config.js"></script>
<script src="admin-topics.js"></script>
</body>
</html>
