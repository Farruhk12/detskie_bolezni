<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Экзаменационные вопросы — Админ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="admin-app">
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="https://www.tajmedun.tj/bitrix/templates/tajmedun/images/logo_new2.png" alt="ТГМУ" class="sidebar-logo">
      <div class="sidebar-brand-text">
        <span class="sidebar-title">Админ</span>
        <span class="sidebar-subtitle">Кафедра детских болезней · ТГМУ</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="admin-topics.html" class="sidebar-link">
        <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><path d="M8 7h8"/><path d="M8 11h8"/></svg></span>
        <span>Добавление тем</span>
      </a>
      <a href="admin-exam.html" class="sidebar-link active">
        <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></span>
        <span>Экзаменационные вопросы</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="admin.html" class="sidebar-link-muted">← В админ-панель</a>
      <a href="index.html" class="sidebar-link-muted">На главную</a>
    </div>
  </aside>
  <div class="app-main">
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="topbar-title">Экзаменационные вопросы</h1>
        <p class="topbar-sub">Добавление списка вопросов по теме</p>
      </div>
    </header>
    <div class="content">
      <div class="admin-wrap">
        <h2 class="admin-section-title">Добавить экзаменационные вопросы</h2>
        <p class="form-hint mb">Формат: <strong>@5Вопрос</strong> — каждая строка начинается с @5.</p>
        <div id="admin-login" class="admin-sub-block">
          <div class="admin-sub-title">Вход</div>
          <div class="input-group">
            <input type="password" id="adminPwd" class="input" placeholder="Пароль администратора">
            <button class="btn-primary" id="adminLoginBtn">Войти</button>
          </div>
          <p id="adminLoginStatus" class="form-hint"></p>
        </div>
        <div id="admin-panel" style="display:none;">
          <div class="admin-sub-block">
            <div class="two-col">
              <div>
                <label class="label" for="adminExamCourse">Курс</label>
                <select id="adminExamCourse" class="select">
                  <option value="">Все курсы</option>
                  <option value="4">4 курс</option>
                  <option value="6">6 курс</option>
                </select>
              </div>
              <div>
                <label class="label" for="adminExamFaculty">Факультет</label>
                <select id="adminExamFaculty" class="select">
                  <option value="">Все факультеты</option>
                  <option value="Педиатрический">Педиатрический</option>
                  <option value="Лечебный">Лечебный</option>
                </select>
              </div>
            </div>
            <label class="label" for="adminExamTopic">Тема для вопросов *</label>
            <select id="adminExamTopic" class="select">
              <option value="">— Выберите тему —</option>
            </select>
            <label class="label" for="adminExamText">Текст из Word</label>
            <textarea id="adminExamText" class="input input-area" style="min-height:200px" placeholder="@5Рахит у детей&#10;@5Назовите основные причины развития рахита."></textarea>
            <div class="input-group">
              <button class="btn-primary" id="adminExamParseBtn">Распарсить</button>
              <button class="btn-primary" id="adminExamSaveBtn" disabled style="background:var(--danger);border:2px solid var(--danger)">Сохранить</button>
            </div>
            <div id="adminExamPreview" class="card" style="display:none;max-height:220px;overflow-y:auto;margin-top:1rem;padding:1rem;"></div>
            <p id="adminExamStatus" class="form-hint"></p>
          </div>
        </div>
      </div>
    </div>
    <footer class="app-footer">
      <a href="admin.html">← В админ-панель</a>
      <a href="index.html">На главную</a>
    </footer>
  </div>
</div>
<script src="config.js"></script>
<script src="admin-exam.js"></script>
</body>
</html>
